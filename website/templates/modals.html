<div class="modal" id="addModal">
    <div class="modal-content">
        <h3>Новый заказ</h3>
        <form method="POST" action="/orders/add">
            <input name="customer" placeholder="Клиент *" required>
            <input name="phone" placeholder="Телефон *" required>
            <input name="address" placeholder="Адрес">
            <textarea name="product" placeholder="Товар / Услуга *" required></textarea>
            <input name="price" placeholder="Цена" type="number" value="0">
            <input name="prepaid" placeholder="Предоплата" type="number" value="0">
            <select name="status">
                {% for s in statuses %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
            </select>
            <select name="executor">
                {% for e in executors %}<option value="{{ e }}">{{ e }}</option>{% endfor %}
            </select>
            <input name="comment" placeholder="Комментарий">
            <div style="display:flex;gap:10px;margin-top:10px">
                <button type="submit" class="btn btn-edit" style="flex:1">Создать</button>
                <button type="button" class="btn btn-del" onclick="closeModal('addModal')" style="flex:1">Отмена</button>
            </div>
        </form>
    </div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h3>Редактировать заказ</h3>
        <form id="editForm" method="POST">
            <input name="customer" id="editCustomer" placeholder="Клиент">
            <input name="phone" id="editPhone" placeholder="Телефон">
            <textarea name="product" id="editProduct" placeholder="Товар"></textarea>
            <input name="price" id="editPrice" type="number">
            <input name="prepaid" id="editPrepaid" type="number" value="0">
            <select name="status" id="editStatus">
                {% for s in statuses %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
            </select>
            <select name="executor" id="editExecutor">
                {% for e in executors %}<option value="{{ e }}">{{ e }}</option>{% endfor %}
            </select>
            <input name="comment" id="editComment" placeholder="Комментарий">
            <div style="display:flex;gap:10px;margin-top:10px">
                <button type="submit" class="btn btn-edit" style="flex:1">Сохранить</button>
                <button type="button" class="btn btn-del" onclick="closeModal('editModal')" style="flex:1">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script>
function openAddModal() { document.getElementById('addModal').classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function openEditModal(order) {
    document.getElementById('editForm').action = '/orders/' + order.id + '/edit';
    document.getElementById('editCustomer').value = order.customer || '';
    document.getElementById('editPhone').value = order.phone || '';
    document.getElementById('editProduct').value = order.product || '';
    document.getElementById('editPrice').value = order.price || 0;
    document.getElementById('editPrepaid').value = order.prepaid || 0;
    document.getElementById('editStatus').value = order.status || 'Новый';
    document.getElementById('editExecutor').value = order.executor || 'Не назначен';
    document.getElementById('editComment').value = order.comment || '';
    document.getElementById('editModal').classList.add('active');
}
</script>
