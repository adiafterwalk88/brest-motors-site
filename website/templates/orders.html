<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказы | Брест-Моторс</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;display:flex}
        .sidebar{width:220px;background:#1a1a2e;color:white;min-height:100vh;padding:20px}
        .sidebar h2{font-size:1.2em;margin-bottom:24px}
        .sidebar a{display:block;color:#aaa;text-decoration:none;padding:10px;border-radius:8px;margin-bottom:4px}
        .sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.1);color:white}
        .main{flex:1;padding:20px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #eee;font-size:13px}
        th{background:#f8f9fa}
        .badge{padding:4px 8px;border-radius:10px;font-size:11px;color:white}
        .badge-new{background:#3498db}.badge-progress{background:#f39c12}.badge-ready{background:#9b59b6}.badge-done{background:#2ecc71}
        .btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;color:white}
        .btn-edit{background:#3498db}.btn-del{background:#e74c3c}
        .filters{display:flex;gap:10px;margin-bottom:16px}
        .filters select,.filters input{padding:8px;border:1px solid #ddd;border-radius:6px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:1000}
        .modal.active{display:flex}
        .modal-content{background:white;padding:24px;border-radius:12px;width:500px;max-height:80vh;overflow-y:auto}
        .modal-content input,.modal-content select,.modal-content textarea{width:100%;padding:8px;margin-bottom:10px;border:1px solid #ddd;border-radius:6px}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🔧 Брест-Моторс</h2>
        <a href="/">📊 Дашборд</a>
        <a href="/orders" class="active">📋 Заказы</a>
        <a href="/clients">👥 Клиенты</a>
        <a href="/logout" style="color:#e74c3c">🚪 Выйти</a>
    </div>
    <div class="main">
        <div class="header">
            <h1>📋 Заказы</h1>
            <button class="btn btn-edit" onclick="openAddModal()" style="padding:12px 24px;font-size:14px">+ Новый заказ</button>
        </div>
        <div class="filters">
            <form method="GET" style="display:flex;gap:10px">
                <input type="text" name="search" placeholder="🔍 Поиск..." value="{{ search }}">
                <select name="status">
                    <option value="">Все статусы</option>
                    {% for s in statuses %}
                    <option value="{{ s }}" {% if current_status==s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
                <select name="executor">
                    <option value="">Все исполнители</option>
                    {% for e in executors %}
                    <option value="{{ e }}" {% if current_executor==e %}selected{% endif %}>{{ e }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="btn btn-edit">Фильтр</button>
            </form>
        </div>
        <table>
            <tr><th>№</th><th>Дата</th><th>Клиент</th><th>Телефон</th><th>Товар</th><th>Цена</th><th>Статус</th><th>Исполнитель</th><th></th></tr>
            {% for o in orders %}
            <tr>
                <td>{{ o.id }}</td>
                <td>{{ o.date }}</td>
                <td>{{ o.customer }}</td>
                <td>{{ o.phone }}</td>
                <td>{{ o.product[:30] }}</td>
                <td>{{ o.price }} Br</td>
                <td><span class="badge badge-{{ 'new' if o.status=='Новый' else 'progress' if o.status=='В работе' else 'ready' if o.status=='Готов' else 'done' }}">{{ o.status }}</span></td>
                <td>{{ o.executor }}</td>
                <td>
                    <button class="btn btn-edit" onclick="openEditModal({{ o | tojson }})">✏️</button>
                    <form method="POST" action="/orders/{{ o.id }}/delete" style="display:inline" onsubmit="return confirm('Удалить?')">
                        <button class="btn btn-del">🗑️</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
    {% include 'modals.html' %}
</body>
</html>
