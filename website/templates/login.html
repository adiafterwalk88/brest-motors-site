<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Брест-Моторс</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: white;
            padding: 40px; border-radius: 16px;
            text-align: center; width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h1 { margin-bottom: 10px; color: #1a1a2e; }
        .login-box p { color: #666; margin-bottom: 24px; }
        .login-box input {
            width: 100%; padding: 14px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 16px; margin-bottom: 16px;
            text-align: center; letter-spacing: 4px;
        }
        .login-box button {
            width: 100%; padding: 14px; background: #1a1a2e;
            color: white; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer;
        }
        .error { color: red; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔧 Брест-Моторс</h1>
        <p>Вход для сотрудников</p>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Введите пароль" required>
            <button type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
