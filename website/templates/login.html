{% extends "base.html" %}

{% block title %}Вход | InTarget Brest Motors{% endblock %}

{% block extra_css %}
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
        font-family: 'Segoe UI', Arial, sans-serif;
        margin: 0;
    }
    .login-wrapper {
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 440px;
    }
    .login-wrapper .logo {
        text-align: center;
        font-size: 48px;
        margin-bottom: 10px;
    }
    .login-wrapper h1 {
        text-align: center;
        margin-bottom: 4px;
        color: #1a1a2e;
        font-size: 24px;
    }
    .login-wrapper .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 24px;
        font-size: 14px;
    }
    .login-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 20px;
        background: #f0f0f0;
        padding: 4px;
        border-radius: 10px;
    }
    .login-tab {
        flex: 1;
        padding: 10px;
        text-align: center;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        border: none;
        background: transparent;
        transition: all .2s;
        font-size: 14px;
    }
    .login-tab.active {
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .login-tab:hover:not(.active) {
        background: rgba(255,255,255,0.5);
    }
    .login-form { display: none; }
    .login-form.active { display: block; }
    .form-group {
        margin-bottom: 16px;
    }
    .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: #333;
        font-size: 14px;
    }
    .form-group select,
    .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 15px;
        transition: border-color .2s;
        background: #fafafa;
        box-sizing: border-box;
    }
    .form-group select:focus,
    .form-group input:focus {
        border-color: #2ecc71;
        outline: none;
        background: white;
    }
    .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #2ecc71, #27ae60);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all .2s;
    }
    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 20px rgba(46,204,113,0.3);
    }
    .flash-message {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 14px;
    }
    .flash-message.success {
        background: #d4edda;
        color: #155724;
        border-left: 4px solid #28a745;
    }
    .
